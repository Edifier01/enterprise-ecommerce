services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      cache_from:
        - enterprise-ecommerce-api:latest
        - enterprise-ecommerce-api:previous
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/ecommerce
      ENVIRONMENT: production
      CORS_ORIGINS: '["https://${DOMAIN}"]'
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-stripe}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      MEDIA_UPLOAD_DIR: /app/uploads
      MEDIA_PUBLIC_BASE_URL: https://${DOMAIN}/media
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      cache_from:
        - enterprise-ecommerce-web:latest
        - enterprise-ecommerce-web:previous
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    environment:
      API_INTERNAL_URL: http://api:8000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:
  media_uploads:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge
