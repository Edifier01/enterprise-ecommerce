services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
      cache_from:
        - enterprise-ecommerce-api:latest
        - enterprise-ecommerce-api:previous
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/ecommerce
      ENVIRONMENT: production
      CORS_ORIGINS: '["https://${DOMAIN}"]'
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-stripe}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STOREFRONT_URL: https://${DOMAIN}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@${DOMAIN}}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # Local media storage (persistent volume)
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-https://${DOMAIN}/media}
      MEDIA_UPLOAD_DIR: ${MEDIA_UPLOAD_DIR:-/app/uploads}
      MEDIA_MAX_UPLOAD_BYTES: ${MEDIA_MAX_UPLOAD_BYTES:-5242880}
      # MoySklad
      MOYSKLAD_API_TOKEN: ${MOYSKLAD_API_TOKEN:-}
      MOYSKLAD_STORE_ID: ${MOYSKLAD_STORE_ID:-}
      MOYSKLAD_RETAIL_PRICE_TYPE: ${MOYSKLAD_RETAIL_PRICE_TYPE:-Цена продажи}
      MOYSKLAD_WHOLESALE_PRICE_TYPE: ${MOYSKLAD_WHOLESALE_PRICE_TYPE:-Розница}
      MOYSKLAD_WEBHOOK_SECRET: ${MOYSKLAD_WEBHOOK_SECRET:-}
      MOYSKLAD_SYNC_CRON_ENABLED: ${MOYSKLAD_SYNC_CRON_ENABLED:-false}
      MOYSKLAD_SYNC_CRON_INTERVAL_SECONDS: ${MOYSKLAD_SYNC_CRON_INTERVAL_SECONDS:-600}
      MOYSKLAD_ORGANIZATION_ID: ${MOYSKLAD_ORGANIZATION_ID:-}
      MOYSKLAD_ORDER_EXPORT_ENABLED: ${MOYSKLAD_ORDER_EXPORT_ENABLED:-true}
      STOREFRONT_MIN_AVAILABLE_STOCK: ${STOREFRONT_MIN_AVAILABLE_STOCK:-3}
      ADMIN_LOW_STOCK_THRESHOLD: ${ADMIN_LOW_STOCK_THRESHOLD:-5}
      ADMIN_INVENTORY_MANUAL_ADJUST_ENABLED: ${ADMIN_INVENTORY_MANUAL_ADJUST_ENABLED:-false}
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-1}
      ADMIN_DEV_EMAIL: ${ADMIN_DEV_EMAIL:-}
      ADMIN_DEV_PASSWORD: ${ADMIN_DEV_PASSWORD:-}
      ADMIN_LOGIN_ALLOWED_IPS: ${ADMIN_LOGIN_ALLOWED_IPS:-[]}
      ADMIN_LOGIN_MAX_ATTEMPTS: ${ADMIN_LOGIN_MAX_ATTEMPTS:-5}
      ADMIN_LOGIN_LOCKOUT_MINUTES: ${ADMIN_LOGIN_LOCKOUT_MINUTES:-15}
      ADMIN_MEDIA_UPLOAD_LIMIT_PER_MINUTE: ${ADMIN_MEDIA_UPLOAD_LIMIT_PER_MINUTE:-20}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - media_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      cache_from:
        - enterprise-ecommerce-web:latest
        - enterprise-ecommerce-web:previous
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    environment:
      API_INTERNAL_URL: http://api:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:
  media_uploads:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge
