openapi: 3.1.0
info:
  title: Enterprise E-Commerce API
  version: 0.1.0
  description: REST API for catalog, checkout, orders, and payments.
paths:
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
  /health/ready:
    get:
      summary: Health Ready
      description: Readiness probe — verifies the database is reachable.
      operationId: health_ready_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/products/facets:
    get:
      tags:
      - catalog
      summary: Get Product Facets
      operationId: getProductFacets
      parameters:
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Scope facets to category slug
          title: Category
        description: Scope facets to category slug
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            minLength: 1
            maxLength: 100
          - type: 'null'
          description: Scope facets to search query
          title: Q
        description: Scope facets to search query
      - name: in_stock
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: When true, only in-stock products
          title: In Stock
        description: When true, only in-stock products
      - name: on_sale
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: When true, only discounted products
          title: On Sale
        description: When true, only discounted products
      - name: size
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          description: Filter by variant size (repeatable)
          default: []
          title: Size
        description: Filter by variant size (repeatable)
      - name: color
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          description: Filter by variant color/camouflage
          default: []
          title: Color
        description: Filter by variant color/camouflage
      - name: price_min
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Minimum price in cents
          title: Price Min
        description: Minimum price in cents
      - name: price_max
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Maximum price in cents
          title: Price Max
        description: Maximum price in cents
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductFacetsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/products:
    get:
      tags:
      - catalog
      summary: List Products
      operationId: listProducts
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by primary category slug
          title: Category
        description: Filter by primary category slug
      - name: in_stock
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: When true, only in-stock products
          title: In Stock
        description: When true, only in-stock products
      - name: on_sale
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: When true, only discounted products
          title: On Sale
        description: When true, only discounted products
      - name: size
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          description: Filter by variant size (repeatable)
          default: []
          title: Size
        description: Filter by variant size (repeatable)
      - name: color
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          description: Filter by variant color/camouflage
          default: []
          title: Color
        description: Filter by variant color/camouflage
      - name: price_min
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Minimum price in cents
          title: Price Min
        description: Minimum price in cents
      - name: price_max
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Maximum price in cents
          title: Price Max
        description: Maximum price in cents
      - name: sort
        in: query
        required: false
        schema:
          type: string
          description: Sort order (popular = best sellers by quantity in last 90 days)
          default: default
          title: Sort
        description: Sort order (popular = best sellers by quantity in last 90 days)
      - name: access_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/products/search:
    get:
      tags:
      - catalog
      summary: Search Products
      operationId: searchProducts
      security:
      - bearerAuth: []
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 100
          description: Search by product name or SKU
          title: Q
        description: Search by product name or SKU
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 24
          title: Limit
      - name: in_stock
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: When true, only in-stock products
          title: In Stock
        description: When true, only in-stock products
      - name: on_sale
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: When true, only discounted products
          title: On Sale
        description: When true, only discounted products
      - name: size
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          description: Filter by variant size (repeatable)
          default: []
          title: Size
        description: Filter by variant size (repeatable)
      - name: color
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          description: Filter by variant color/camouflage
          default: []
          title: Color
        description: Filter by variant color/camouflage
      - name: price_min
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Minimum price in cents
          title: Price Min
        description: Minimum price in cents
      - name: price_max
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Maximum price in cents
          title: Price Max
        description: Maximum price in cents
      - name: sort
        in: query
        required: false
        schema:
          type: string
          description: Sort order (default = relevance)
          default: default
          title: Sort
        description: Sort order (default = relevance)
      - name: access_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/products/{slug}/erp-image:
    get:
      tags:
      - catalog
      summary: Get Product Erp Image
      description: Proxy MoySklad product image for browser display (MS download URLs require auth).
      operationId: getProductErpImage
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/products/{slug}:
    get:
      tags:
      - catalog
      summary: Get Product
      operationId: getProduct
      security:
      - bearerAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      - name: access_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
