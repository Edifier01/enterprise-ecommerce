openapi: 3.1.0
info:
  title: Enterprise E-Commerce API
  version: 0.1.0
  description: REST API for catalog, checkout, orders, and payments.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      summary: Readiness probe
      operationId: healthReady
      responses:
        "200":
          description: Service ready (database reachable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unavailable

  /api/v1/products:
    get:
      summary: List products
      operationId: listProducts
      tags: [catalog]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          description: Filter by primary category slug
          schema:
            type: string
        - name: in_stock
          in: query
          description: When true, only in-stock products
          schema:
            type: boolean
        - name: on_sale
          in: query
          description: When true, only discounted products
          schema:
            type: boolean
        - name: size
          in: query
          description: Filter by variant size (repeatable)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: color
          in: query
          description: Filter by variant color or camouflage
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: price_min
          in: query
          description: Minimum price in cents
          schema:
            type: integer
            minimum: 0
        - name: price_max
          in: query
          description: Maximum price in cents
          schema:
            type: integer
            minimum: 0
        - name: sort
          in: query
          description: Sort order (popular = best sellers by quantity in last 90 days)
          schema:
            type: string
            enum: [default, popular, price_asc, price_desc, name_asc, name_desc]
            default: default
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /api/v1/products/facets:
    get:
      summary: Get catalog filter facets
      operationId: getProductFacets
      tags: [catalog]
      parameters:
        - name: category
          in: query
          description: Scope facets to category slug
          schema:
            type: string
        - name: q
          in: query
          description: Scope facets to search query
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: in_stock
          in: query
          schema:
            type: boolean
        - name: on_sale
          in: query
          schema:
            type: boolean
        - name: size
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: color
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: price_min
          in: query
          schema:
            type: integer
            minimum: 0
        - name: price_max
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Available filter facets for the catalog scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductFacetsResponse"

  /api/v1/products/search:
    get:
      summary: Search products by name or SKU
      operationId: searchProducts
      tags: [catalog]
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (product name or variant SKU)
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
        - name: in_stock
          in: query
          schema:
            type: boolean
        - name: on_sale
          in: query
          schema:
            type: boolean
        - name: size
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: color
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: price_min
          in: query
          description: Minimum price in cents
          schema:
            type: integer
            minimum: 0
        - name: price_max
          in: query
          description: Maximum price in cents
          schema:
            type: integer
            minimum: 0
        - name: sort
          in: query
          schema:
            type: string
            enum: [default, popular, price_asc, price_desc, name_asc, name_desc]
            default: default
      responses:
        "200":
          description: Paginated search results ordered by relevance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "422":
          description: Validation error (empty or too long query)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/products/{slug}:
    get:
      summary: Get product by slug
      operationId: getProduct
      tags: [catalog]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/categories:
    get:
      summary: List active categories
      operationId: listCategories
      tags: [catalog]
      responses:
        "200":
          description: List of active categories ordered by sort_order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/register/wholesaler:
    post:
      summary: Register a wholesaler account with business profile
      operationId: registerWholesaler
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WholesalerRegisterRequest"
      responses:
        "201":
          description: Wholesaler registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "409":
          description: Email or INN already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      summary: Login and receive access token
      operationId: loginUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/verify-email:
    post:
      summary: Verify email with one-time token
      operationId: verifyEmail
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/resend-verification:
    post:
      summary: Resend email verification link
      operationId: resendVerification
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: Generic success (anti-enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/auth/forgot-password:
    post:
      summary: Request password reset email
      operationId: forgotPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Generic success (anti-enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/auth/reset-password:
    post:
      summary: Reset password with one-time token
      operationId: resetPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/cart:
    get:
      summary: Get current cart
      operationId: getCart
      tags: [checkout]
      responses:
        "200":
          description: Current active cart (guest or authenticated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"

  /api/v1/cart/lines:
    post:
      summary: Add or update cart line
      operationId: addCartLine
      tags: [checkout]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartLineRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          description: Variant not purchasable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/cart/lines/{line_id}:
    patch:
      summary: Update cart line quantity
      operationId: updateCartLine
      tags: [checkout]
      parameters:
        - name: line_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartLineRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "404":
          description: Cart line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Remove cart line
      operationId: deleteCartLine
      tags: [checkout]
      parameters:
        - name: line_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "404":
          description: Cart line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/checkout/sessions:
    post:
      summary: Create checkout session from active cart
      operationId: createCheckoutSession
      tags: [checkout]
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          description: Empty or invalid cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/checkout/sessions/{session_id}:
    get:
      summary: Get checkout session status
      operationId: getCheckoutSession
      tags: [checkout]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Checkout session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/checkout/sessions/{session_id}/payment-intent:
    post:
      summary: Create Stripe PaymentIntent for checkout session
      operationId: createPaymentIntent
      tags: [payments]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PaymentIntent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Invalid session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Payment processing unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/webhooks/stripe:
    post:
      summary: Stripe webhook endpoint
      operationId: stripeWebhook
      tags: [payments]
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          description: Webhook verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders:
    get:
      summary: List authenticated customer orders
      operationId: listOrders
      tags: [orders]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{order_number}:
    get:
      summary: Get order detail by order number
      operationId: getOrder
      tags: [orders]
      security:
        - bearerAuth: []
      parameters:
        - name: order_number
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail with line items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/auth/login:
    post:
      summary: Admin login
      operationId: adminLogin
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Admin access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/auth/me:
    get:
      summary: Get current admin user
      operationId: getCurrentAdmin
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current admin profile and permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"
        "401":
          description: Not authenticated or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/media/upload:
    post:
      summary: Upload product image (local storage)
      operationId: adminUploadMedia
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Public URL of uploaded image
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/dashboard/summary:
    get:
      summary: Admin dashboard summary metrics
      operationId: getAdminDashboardSummary
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Read-only operational metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing admin:read permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/catalog/products:
    get:
      summary: Admin list products (all statuses)
      operationId: adminListProducts
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, archived]
        - name: q
          in: query
          schema:
            type: string
            maxLength: 200
          description: Search by product name, slug, or variant SKU (all statuses)
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter products by primary category
        - name: uncategorized
          in: query
          schema:
            type: boolean
            default: false
          description: When true, list only products without a category
      responses:
        "200":
          description: Paginated admin product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProductListResponse"
    post:
      summary: Admin create product
      operationId: adminCreateProduct
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProductSchema"

  /api/v1/admin/catalog/categories:
    get:
      summary: Admin list categories (all)
      operationId: adminListCategories
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCategoryListResponse"
    post:
      summary: Admin create category
      operationId: adminCreateCategory
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /api/v1/admin/inventory:
    get:
      summary: Admin list inventory items
      operationId: adminListInventory
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: low_stock
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Inventory list with variant SKU and availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminInventoryListResponse"

  /api/v1/admin/inventory/{variant_id}:
    patch:
      summary: Admin adjust inventory on-hand quantity
      operationId: adminAdjustInventory
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: variant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAdjustInventoryRequest"
      responses:
        "200":
          description: Updated inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminInventoryItemSchema"
        "409":
          description: Version conflict
        "422":
          description: on_hand below reserved quantity

  /api/v1/admin/orders:
    get:
      summary: Admin list orders
      operationId: adminListOrders
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [confirmed, shipped, canceled]
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderListResponse"

  /api/v1/admin/orders/{order_number}:
    get:
      summary: Admin get order detail
      operationId: adminGetOrder
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: order_number
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail with lines and status history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderDetailSchema"
        "404":
          description: Order not found

  /api/v1/admin/orders/{order_number}/status:
    patch:
      summary: Admin update order status (ship or cancel)
      operationId: adminUpdateOrderStatus
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: order_number
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderDetailSchema"
        "404":
          description: Order not found
        "422":
          description: Invalid status transition

  /api/v1/admin/customers:
    get:
      summary: Admin list customers
      operationId: adminListCustomers
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCustomerListResponse"

  /api/v1/admin/customers/{customer_id}/wholesaler:
    patch:
      summary: Admin grant or revoke wholesaler status
      operationId: adminUpdateCustomerWholesaler
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateWholesalerRequest"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCustomerSchema"
        "404":
          description: Customer not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ProductVariant:
      type: object
      required: [id, sku, name, price_cents, in_stock, is_default, sort_order, attributes]
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        price_cents:
          type: integer
        wholesale_price_cents:
          type: integer
          description: Omitted for non-wholesaler API consumers
        in_stock:
          type: boolean
        is_default:
          type: boolean
        sort_order:
          type: integer
        attributes:
          type: object
          additionalProperties:
            type: string

    Product:
      type: object
      required: [id, name, slug, price_cents, currency, in_stock]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        price_cents:
          type: integer
        compare_at_price_cents:
          type: integer
          nullable: true
        currency:
          type: string
          example: RUB
        in_stock:
          type: boolean
        category_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"

    Category:
      type: object
      required: [id, slug, name, is_active, sort_order]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
        sort_order:
          type: integer
        product_count:
          type: integer
          default: 0

    CategoryListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        total:
          type: integer

    ProductListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductFacetsResponse:
      type: object
      required: [sizes, colors, price_min_cents, price_max_cents]
      properties:
        sizes:
          type: array
          items:
            type: string
        colors:
          type: array
          items:
            type: string
        price_min_cents:
          type: integer
        price_max_cents:
          type: integer
        size_counts:
          type: object
          additionalProperties:
            type: integer
        color_counts:
          type: object
          additionalProperties:
            type: integer

    RegisterRequest:
      type: object
      required: [first_name, last_name, email, password]
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    WholesalerRegisterRequest:
      type: object
      required:
        - full_name
        - edo_provider
        - edo_id
        - phone
        - inn
        - ogrnip
        - legal_address
        - email
        - password
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        edo_provider:
          type: string
          minLength: 1
          maxLength: 255
        edo_id:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          minLength: 1
          maxLength: 32
        inn:
          type: string
          pattern: "^\\d{12}$"
        ogrnip:
          type: string
          pattern: "^\\d{15}$"
        legal_address:
          type: string
          minLength: 1
          maxLength: 500
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    RegisterResponse:
      type: object
      required: [id, email, first_name, last_name, created_at, email_verification_required]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        created_at:
          type: string
          format: date-time
        email_verification_required:
          type: boolean

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 256

    ResendVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 256
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer

    MeResponse:
      type: object
      required: [id, email, first_name, last_name, is_wholesaler, email_verified, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        is_wholesaler:
          type: boolean
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
