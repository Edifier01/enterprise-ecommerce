        id:
          type: string
          format: uuid
        variant_id:
          type: string
          format: uuid
        quantity:
          type: integer
        unit_price_cents:
          type: integer
        line_total_cents:
          type: integer
        currency:
          type: string
        product_snapshot:
          type: object
          description: Immutable product/variant snapshot at line creation time
          properties:
            variant_id:
              type: string
              format: uuid
            sku:
              type: string
            name:
              type: string
            product_id:
              type: string
              format: uuid
            product_name:
              type: string
            product_slug:
              type: string
            price_cents:
              type: integer
              description: Retail reference price at snapshot time
            currency:
              type: string
            price_tier:
              type: string
              enum: [retail, wholesale]
              description: Commercial tier applied to unit_price_cents (ADR-008)

    CartResponse:
      type: object
      required: [id, status, subtotal_cents, total_cents, lines]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        currency:
          type: string
