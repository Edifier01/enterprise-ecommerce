openapi: 3.1.0
info:
  title: Enterprise E-Commerce API
  version: 0.1.0
  description: REST API for catalog, checkout, orders, and payments.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      summary: Readiness probe
      operationId: healthReady
      responses:
        "200":
          description: Service ready (database reachable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unavailable

  /api/v1/products:
    get:
      summary: List products
      operationId: listProducts
      tags: [catalog]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          description: Filter by primary category slug
          schema:
            type: string
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /api/v1/products/{slug}:
    get:
      summary: Get product by slug
      operationId: getProduct
      tags: [catalog]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/categories:
    get:
      summary: List active categories
      operationId: listCategories
      tags: [catalog]
      responses:
        "200":
          description: List of active categories ordered by sort_order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      summary: Login and receive access token
      operationId: loginUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/cart:
    get:
      summary: Get current cart
      operationId: getCart
      tags: [checkout]
      responses:
        "200":
          description: Current active cart (guest or authenticated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"

  /api/v1/cart/lines:
    post:
      summary: Add or update cart line
      operationId: addCartLine
      tags: [checkout]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartLineRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          description: Variant not purchasable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/cart/lines/{line_id}:
    patch:
      summary: Update cart line quantity
      operationId: updateCartLine
      tags: [checkout]
      parameters:
        - name: line_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartLineRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "404":
          description: Cart line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Remove cart line
      operationId: deleteCartLine
      tags: [checkout]
      parameters:
        - name: line_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "404":
          description: Cart line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/checkout/sessions:
    post:
      summary: Create checkout session from active cart
      operationId: createCheckoutSession
      tags: [checkout]
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          description: Empty or invalid cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/checkout/sessions/{session_id}:
    get:
      summary: Get checkout session status
      operationId: getCheckoutSession
      tags: [checkout]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Checkout session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/checkout/sessions/{session_id}/payment-intent:
    post:
      summary: Create Stripe PaymentIntent for checkout session
      operationId: createPaymentIntent
      tags: [payments]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PaymentIntent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Invalid session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Payment processing unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/webhooks/stripe:
    post:
      summary: Stripe webhook endpoint
      operationId: stripeWebhook
      tags: [payments]
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          description: Webhook verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ProductVariant:
      type: object
      required: [id, sku, name, price_cents, in_stock, is_default, sort_order, attributes]
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        price_cents:
          type: integer
        in_stock:
          type: boolean
        is_default:
          type: boolean
        sort_order:
          type: integer
        attributes:
          type: object
          additionalProperties:
            type: string

    Product:
      type: object
      required: [id, name, slug, price_cents, currency, in_stock]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        price_cents:
          type: integer
        compare_at_price_cents:
          type: integer
          nullable: true
        currency:
          type: string
          example: USD
        in_stock:
          type: boolean
        category_id:
          type: string
          format: uuid
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"

    Category:
      type: object
      required: [id, slug, name, is_active, sort_order]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
        sort_order:
          type: integer

    CategoryListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        total:
          type: integer

    ProductListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    RegisterResponse:
      type: object
      required: [id, email, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        created_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer

    MeResponse:
      type: object
      required: [id, email, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

    CartLine:
      type: object
      required: [id, variant_id, quantity, unit_price_cents, line_total_cents, currency, product_snapshot]
      properties:
        id:
          type: string
          format: uuid
        variant_id:
          type: string
          format: uuid
        quantity:
          type: integer
        unit_price_cents:
          type: integer
        line_total_cents:
          type: integer
        currency:
          type: string
        product_snapshot:
          type: object

    CartResponse:
      type: object
      required: [id, status, subtotal_cents, total_cents, lines]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        currency:
          type: string
          nullable: true
        subtotal_cents:
          type: integer
        total_cents:
          type: integer
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CartLine"
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    AddCartLineRequest:
      type: object
      required: [variant_id, quantity]
      properties:
        variant_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    UpdateCartLineRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 0

    CheckoutSessionResponse:
      type: object
      required: [id, cart_id, status, currency, subtotal_cents, total_cents, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        cart_id:
          type: string
          format: uuid
        status:
          type: string
        currency:
          type: string
        subtotal_cents:
          type: integer
        total_cents:
          type: integer
        order_number:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentIntentResponse:
      type: object
      required: [client_secret, payment_intent_id]
      properties:
        client_secret:
          type: string
        payment_intent_id:
          type: string

    WebhookResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string

tags:
  - name: catalog
    description: Product catalog
  - name: auth
    description: Authentication and user management
  - name: checkout
    description: Cart and checkout
  - name: orders
    description: Order management
  - name: payments
    description: Payment processing
