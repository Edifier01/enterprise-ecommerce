          type: integer
          minimum: 0

    CheckoutSessionResponse:
      type: object
      required: [id, cart_id, status, currency, subtotal_cents, total_cents, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        cart_id:
          type: string
          format: uuid
        status:
          type: string
        currency:
          type: string
        subtotal_cents:
          type: integer
        total_cents:
          type: integer
        order_number:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentIntentResponse:
      type: object
