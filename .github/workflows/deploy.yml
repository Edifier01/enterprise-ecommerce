name: Deploy

# Auto-deploy after CI succeeds on push to master.
# Manual deploy via workflow_dispatch bypasses CI gate (emergency ops only).
# Requires secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.repository == 'Edifier01/enterprise-ecommerce' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 120m
          script: |
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            cd enterprise-ecommerce
            git fetch origin master
            git reset --hard origin/master
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh
