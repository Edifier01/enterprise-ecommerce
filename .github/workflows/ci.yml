name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Lint with ruff
        run: ruff check apps/api/app/ apps/api/tests/

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          INVENTORY_RESERVATION_SWEEP_ENABLED: "false"
          ENVIRONMENT: "test"
        run: pytest tests/ -q

  frontend:
    name: Frontend (Node 24)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/ecommerce"
      E2E_API_PORT: "8001"
      E2E_WEB_PORT: "3002"
      PAYMENT_PROVIDER: stub
      ENVIRONMENT: "test"
      CORS_ORIGINS: '["http://localhost:3002"]'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install chromium --with-deps

      - name: TypeScript type check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Run Playwright E2E tests
        working-directory: apps/web
        run: npx playwright test
